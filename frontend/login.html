<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TI Suporte — Login</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#0f62fe;--blue-dark:#0043ce;
  --red:#da1e28;
  --gray-50:#8d8d8d;--gray-100:#161616;
}
body{
  font-family:'IBM Plex Sans',sans-serif;
  background:var(--gray-100);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
body::before{
  content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);
  background-size:40px 40px;
}
body::after{
  content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);
  width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(15,98,254,0.12) 0%,transparent 70%);
  pointer-events:none;
}
.wrap{position:relative;z-index:10;width:100%;max-width:420px;padding:0 24px;animation:up 0.4s ease both;}
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:40px;}
.brand-icon{background:var(--blue);width:40px;height:40px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.brand-name{font-family:'IBM Plex Mono',monospace;font-size:1rem;font-weight:500;color:white;}
.brand-sub{font-size:0.7rem;color:var(--gray-50);}
.card{background:#1c1c1c;border:1px solid #2a2a2a;padding:32px;}
.card-title{font-size:1.25rem;font-weight:300;color:white;margin-bottom:4px;}
.card-title strong{font-weight:700;}
.card-sub{font-size:0.8rem;color:var(--gray-50);margin-bottom:28px;}
.form-group{margin-bottom:20px;}
label{display:block;font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--gray-50);margin-bottom:8px;}
input{
  width:100%;font-family:'IBM Plex Sans',sans-serif;font-size:0.9rem;
  background:#262626;border:none;border-bottom:2px solid #3a3a3a;
  padding:12px 14px;color:white;outline:none;transition:all 0.15s;
}
input:focus{background:#2a2a2a;border-bottom-color:var(--blue);}
input::placeholder{color:#4a4a4a;}
input.err{border-bottom-color:var(--red);}
.err-box{
  display:none;background:rgba(218,30,40,0.1);border-left:3px solid var(--red);
  padding:10px 14px;font-size:0.8rem;color:#ff8389;margin-bottom:20px;
}
.err-box.show{display:block;}
.btn{
  width:100%;background:var(--blue);color:white;border:none;padding:14px;
  font-family:'IBM Plex Sans',sans-serif;font-size:0.9rem;font-weight:600;
  cursor:pointer;transition:background 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn:hover{background:var(--blue-dark);}
.btn:disabled{background:#333;color:#666;cursor:not-allowed;}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;display:none;}
.btn.loading .spinner{display:block;}
.btn.loading .txt{display:none;}
@keyframes spin{to{transform:rotate(360deg)}}
.portal-link{margin-top:18px;text-align:center;font-size:0.78rem;color:#444;}
.portal-link a{color:#888;text-decoration:none;}
.portal-link a:hover{color:white;}
.footer{position:fixed;bottom:16px;font-size:0.7rem;color:#2d2d2d;}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-icon">💻</div>
    <div>
      <div class="brand-name">TI_SUPORTE</div>
      <div class="brand-sub">Grau Técnico Cabo</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Acesso <strong>Técnico</strong></div>
    <div class="card-sub">Entre com suas credenciais para acessar o painel</div>
    <div class="err-box" id="err"></div>
    <div class="form-group">
      <label>Usuário</label>
      <input type="text" id="username" placeholder="ex: hermeson" autocomplete="username" />
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn" id="btn" onclick="login()">
      <div class="spinner"></div>
      <span class="txt">Entrar →</span>
    </button>
    <div class="portal-link"><a href="solicitante.html">← Portal do Solicitante</a></div>
  </div>
</div>
<div class="footer">Central de Chamados TI · HermesonTI · Emanoel · Ghabriel</div>
<script>
const API = (window.location.hostname==='localhost'||window.location.hostname==='127.0.0.1') ? 'http://localhost:5000/api' : window.location.origin+'/api';
const token = sessionStorage.getItem('ti-token');
if (token) {
  fetch(`${API}/auth/me`,{headers:{Authorization:`Bearer ${token}`}})
    .then(r=>r.ok?r.json():null).then(s=>{if(s)location.href='tecnico.html';}).catch(()=>{});
}
document.getElementById('senha').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
document.getElementById('username').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('senha').focus();});
async function login(){
  const username=document.getElementById('username').value.trim();
  const senha=document.getElementById('senha').value;
  const btn=document.getElementById('btn');
  const err=document.getElementById('err');
  err.className='err-box';
  ['username','senha'].forEach(id=>document.getElementById(id).classList.remove('err'));
  if(!username||!senha){err.textContent='Preencha usuário e senha.';err.classList.add('show');return;}
  btn.disabled=true;btn.classList.add('loading');
  try{
    const r=await fetch(`${API}/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,senha})});
    const d=await r.json();
    if(!r.ok){
      err.textContent='⚠️ '+(d.error||'Erro ao fazer login.');err.classList.add('show');
      ['username','senha'].forEach(id=>document.getElementById(id).classList.add('err'));
      return;
    }
    sessionStorage.setItem('ti-token',d.token);
    sessionStorage.setItem('ti-nome',d.nome);
    sessionStorage.setItem('ti-role',d.role);
    location.href='tecnico.html';
  }catch(e){
    err.textContent='❌ Não foi possível conectar ao servidor. Verifique se o backend está rodando.';
    err.classList.add('show');
  }finally{btn.disabled=false;btn.classList.remove('loading');}
}
</script>
</body>
</html>
